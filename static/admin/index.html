<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>内容管理 - 我的摄影日记</title>
  <style>
    body { font-family: system-ui; background: #0b0b0f; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .admin-panel { background: #14161d; border: 1px solid #333; border-radius: 12px; padding: 40px; max-width: 400px; text-align: center; }
    .admin-panel h1 { margin-bottom: 16px; font-size: 1.5rem; }
    .admin-panel p { color: #888; margin-bottom: 24px; }
    .admin-panel a { display: inline-block; background: #e76f51; color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; }
    .admin-panel a:hover { background: #d65d3e; }
  </style>
</head>
<body>
  <div class="admin-panel">
    <h1>内容管理</h1>
    <p>点击下方按钮进入 Netlify CMS 管理后台</p>
    <a href="/admin/config.yml">打开 CMS 后台</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/netlify-cms@2.44.0/dist/netlify-cms.js"></script>
</body>
</html>
