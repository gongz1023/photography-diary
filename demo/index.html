<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龚仔的摄影日记</title>
  <style>
    :root{--bg:#0b0b0f;--card:#14161d;--text:#e9e9e9;--muted:#888;--accent:#e76f51;--border:rgba(255,255,255,.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none;transition:color .2s}
    a:hover{color:var(--accent)}
    .site-header{padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(11,11,15,.95);backdrop-filter:blur(8px);z-index:100}
    .site-header h1{font-size:1.4rem;font-weight:600}
    .site-header h1 a:hover{color:var(--text)}
    .site-nav a{margin-left:24px;color:var(--muted);font-size:.95rem}
    .site-nav a:hover{color:var(--text)}
    .container{max-width:1400px;margin:0 auto;padding:24px;flex:1}
    .albums{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
    .album{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .3s,box-shadow .3s}
    .album:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
    .album img.cover{width:100%;height:220px;object-fit:cover;display:block}
    .album h2{font-size:1.05rem;margin:12px 12px 4px}
    .album .date{color:var(--muted);margin:0 12px 14px;font-size:.85rem}
    .site-footer{text-align:center;padding:24px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem}
    @media(max-width:768px){
      .site-header{padding:12px 16px}
      .site-header h1{font-size:1.2rem}
      .container{padding:16px}
      .albums{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
      .album img.cover{height:160px}
    }
    @media(max-width:480px){
      .albums{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1><a href="index.html">龚仔的摄影日记</a></h1>
    <nav class="site-nav">
      <a href="index.html">首页</a>
      <a href="donate.html">捐助</a>
    </nav>
  </header>
  <main class="container">
    <h2 style="margin-bottom:24px;color:var(--muted);font-weight:400;font-size:1.1rem;">最新作品</h2>
    <section class="albums">
      <article class="album">
        <a href="album-1.html">
          <img class="cover" src="https://picsum.photos/seed/photo1/800/600" alt="今日最佳" loading="lazy">
          <h2>今日最佳</h2>
          <p class="date">2025-11-08</p>
        </a>
      </article>
      <article class="album">
        <a href="album-2.html">
          <img class="cover" src="https://picsum.photos/seed/city1/800/600" alt="城市夜景" loading="lazy">
          <h2>城市夜景</h2>
          <p class="date">2025-10-15</p>
        </a>
      </article>
    </section>
  </main>
  <footer class="site-footer">
    <p>© 2026 龚仔的摄影日记</p>
  </footer>
</body>
</html>
