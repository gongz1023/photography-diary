<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市夜景 - 龚仔的摄影日记</title>
  <style>
    :root{--bg:#0b0b0f;--card:#14161d;--text:#e9e9e9;--muted:#888;--accent:#e76f51;--border:rgba(255,255,255,.08)}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none;transition:color .2s}
    a:hover{color:var(--accent)}
    .site-header{padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(11,11,15,.95);backdrop-filter:blur(8px);z-index:100}
    .site-header h1{font-size:1.4rem;font-weight:600}
    .site-nav a{margin-left:24px;color:var(--muted)}
    .container{max-width:1400px;margin:0 auto;padding:24px;flex:1}
    .back-link{display:inline-flex;align-items:center;gap:6px;margin-bottom:20px;color:var(--muted);font-size:.9rem;padding:6px 12px;border-radius:6px;background:rgba(255,255,255,.05)}
    .back-link:hover{color:var(--text);background:rgba(255,255,255,.1)}
    .album-header{margin-bottom:32px}
    .album-title{font-size:2.2rem;margin-bottom:8px;font-weight:600}
    .album-date{color:var(--muted);font-size:1rem}
    .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .photo-item{position:relative;overflow:hidden;border-radius:12px;aspect-ratio:4/3;cursor:pointer;background:var(--card)}
    .photo-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
    .photo-item:hover img{transform:scale(1.05)}
    .photo-overlay{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.7));opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;padding:16px}
    .photo-item:hover .photo-overlay{opacity:1}
    .photo-caption{color:#fff;font-size:.9rem;font-weight:500}
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:1000;align-items:center;justify-content:center}
    .lightbox.active{display:flex}
    .lightbox-close{position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:3rem;cursor:pointer;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .2s}
    .lightbox-close:hover{background:rgba(255,255,255,.1)}
    .lightbox-content{max-width:90vw;max-height:85vh;text-align:center}
    .lightbox img{max-width:100%;max-height:75vh;object-fit:contain;border-radius:8px}
    .lightbox-info{margin-top:20px;text-align:center}
    .lb-caption{font-size:1.2rem;color:#fff;margin-bottom:12px}
    .lb-exif{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;font-size:.9rem;color:#aaa}
    .lb-exif span{background:rgba(255,255,255,.1);padding:6px 12px;border-radius:20px}
    .site-footer{text-align:center;padding:24px;border-top:1px solid var(--border);color:var(--muted);font-size:.85rem;margin-top:auto}
    @media(max-width:1024px){.photo-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){
      .site-header{padding:12px 16px}
      .container{padding:16px}
      .album-title{font-size:1.6rem}
      .photo-grid{grid-template-columns:1fr;gap:12px}
      .photo-item{aspect-ratio:16/10}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1><a href="index.html">龚仔的摄影日记</a></h1>
    <nav class="site-nav">
      <a href="index.html">首页</a>
      <a href="donate.html">捐助</a>
    </nav>
  </header>
  <main class="container">
    <a href="index.html" class="back-link">← 返回</a>
    <div class="album-header">
      <h1 class="album-title">城市夜景</h1>
      <p class="album-date">2025-10-15</p>
    </div>
    <section class="photo-grid">
      <div class="photo-item" onclick='openLightbox("https://picsum.photos/seed/city1/1600/1200","都市霓虹","Nikon Z6","f/1.8","1/60s","800","85mm")'>
        <img src="https://picsum.photos/seed/city1/800/600" alt="都市霓虹" loading="lazy">
        <div class="photo-overlay"><span class="photo-caption">都市霓虹</span></div>
      </div>
      <div class="photo-item" onclick='openLightbox("https://picsum.photos/seed/city2/1600/1200","时代广场","Nikon Z6","f/2.8","1/125s","400","50mm")'>
        <img src="https://picsum.photos/seed/city2/800/600" alt="时代广场" loading="lazy">
        <div class="photo-overlay"><span class="photo-caption">时代广场</span></div>
      </div>
      <div class="photo-item" onclick='openLightbox("https://picsum.photos/seed/city3/1600/1200","霓虹街道","Sony A7III","f/2.0","1/80s","1600","35mm")'>
        <img src="https://picsum.photos/seed/city3/800/600" alt="霓虹街道" loading="lazy">
        <div class="photo-overlay"><span class="photo-caption">霓虹街道</span></div>
      </div>
      <div class="photo-item" onclick='openLightbox("https://picsum.photos/seed/city4/1600/1200","城市天际线","Nikon Z6","f/8.0","30s","100","16mm")'>
        <img src="https://picsum.photos/seed/city4/800/600" alt="城市天际线" loading="lazy">
        <div class="photo-overlay"><span class="photo-caption">城市天际线</span></div>
      </div>
    </section>
  </main>
  <div id="lightbox" class="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <div class="lightbox-content">
      <img id="lb-img" src="" alt="">
      <div class="lightbox-info">
        <p id="lb-caption" class="lb-caption"></p>
        <div id="lb-exif" class="lb-exif"></div>
      </div>
    </div>
  </div>
  <footer class="site-footer">
    <p>© 2026 龚仔的摄影日记</p>
  </footer>
  <script>
    function openLightbox(url,caption,camera,fnumber,exposure,iso,focal){
      document.getElementById('lb-img').src=url;
      document.getElementById('lb-caption').textContent=caption;
      var exif='<span>📷 '+camera+'</span><span>⭕ '+fnumber+'</span><span>⏱ '+exposure+'</span><span>ISO '+iso+'</span><span>🔭 '+focal+'</span>';
      document.getElementById('lb-exif').innerHTML=exif;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox(){document.getElementById('lightbox').classList.remove('active')}
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox()});
  </script>
</body>
</html>
