[build]
  publish = "_site"
  command = "npm install --ignore-scripts --no-package-lock --registry=https://registry.npmjs.org/ && npx @11ty/eleventy"
  functions = "netlify/functions"

[build.environment]
  NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/album/*"
  to = "/album/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
